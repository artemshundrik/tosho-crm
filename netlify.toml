[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[[redirects]]
from = "/api/fetch-v9ky-standings"
to = "/.netlify/functions/fetch-v9ky-standings"
status = 200

[[redirects]]
from = "/api/fx-rates"
to = "/.netlify/functions/fx-rates"
status = 200
